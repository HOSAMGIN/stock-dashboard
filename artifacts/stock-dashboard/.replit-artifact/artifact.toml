kind = "web"
previewPath = "/"
title = "주식 투자 타이밍 현황판"
version = "1.0.0"
id = "artifacts/stock-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22996
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/stock-dashboard run dev"

[services.env]
PORT = "22996"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/stock-dashboard", "run", "build"]
publicDir = "artifacts/stock-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
